name: Deploy SwarmClaw

# One workflow to rule them all:
#   1. Bootstrap HF Dataset + Space (idempotent)
#   2. Push secrets + variables to the Space
#   3. Upload deploy/hf-space/ to the Space (this triggers the rebuild)
#   4. Deploy the Cloudflare Worker that wakes + proxies the Space
#
# Required GitHub secrets (Settings -> Secrets and variables -> Actions):
#   HF_TOKEN              HF token, write on Spaces + Datasets
#   HF_USERNAME           your HF username
#   CLOUDFLARE_API_TOKEN  Cloudflare API token with "Edit Workers" perms
#   CLOUDFLARE_ACCOUNT_ID Cloudflare account ID (Dashboard -> right sidebar)
#
# Optional GitHub secrets:
#   ACCESS_KEY            SwarmClaw login key (auto-generated on first run if absent)
#   CREDENTIAL_SECRET     SwarmClaw cred-encryption secret (auto-generated if absent)
#
# Optional GitHub variables (Settings -> Secrets and variables -> Actions -> Variables):
#   HF_SPACE_NAME         default: swarmclaw
#   HF_DATASET_NAME       default: swarmclaw-state
#   SPACE_HARDWARE        default: cpu-basic
#   SPACE_PRIVATE         "true"/"false", default: false
#   DATASET_PRIVATE       "true"/"false", default: true
#   WORKER_NAME           default: swarmclaw-wake
#   WORKER_REQUIRE_KEY    "true"/"false", default: false  (require ACCESS_KEY on Worker)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: swarmclaw-deploy
  cancel-in-progress: false

jobs:
  hf-space:
    name: Bootstrap & deploy HF Space
    runs-on: ubuntu-latest
    outputs:
      space_url: ${{ steps.bootstrap.outputs.space_url }}
      space_direct_url: ${{ steps.bootstrap.outputs.space_direct_url }}
      dataset_url: ${{ steps.bootstrap.outputs.dataset_url }}
      space_repo: ${{ steps.bootstrap.outputs.space_repo }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install huggingface_hub
        run: pip install --quiet "huggingface_hub>=0.26.0"

      - name: Validate required secrets
        env:
          HF_TOKEN_RAW: ${{ secrets.HF_TOKEN }}
          HF_USERNAME_RAW: ${{ secrets.HF_USERNAME }}
        run: |
          set -e
          # Strip leading/trailing whitespace and CR/LF that frequently sneak
          # in via copy-paste. Without this, httpx rejects the auth header
          # with: LocalProtocolError: Illegal header value b'<token> '
          HF_TOKEN=$(printf '%s' "$HF_TOKEN_RAW" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          HF_USERNAME=$(printf '%s' "$HF_USERNAME_RAW" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

          [ -n "$HF_TOKEN" ]    || { echo "::error::Missing secret HF_TOKEN"; exit 1; }
          [ -n "$HF_USERNAME" ] || { echo "::error::Missing secret HF_USERNAME"; exit 1; }

          # Detect placeholder / truncated values
          if [ "${#HF_TOKEN}" -lt 20 ]; then
            echo "::error::HF_TOKEN looks invalid (length ${#HF_TOKEN} < 20 after trimming)."
            echo "::error::Create a fresh token at https://huggingface.co/settings/tokens"
            echo "::error::and copy it RIGHT AFTER creation (HF only shows it once)."
            exit 1
          fi
          case "$HF_TOKEN" in
            hf_*) ;;
            *)
              echo "::warning::HF_TOKEN doesn't start with 'hf_'. If the next step"
              echo "::warning::fails with an auth error, your token is malformed."
              ;;
          esac

          # Warn (don't fail) if the user pasted with surrounding whitespace
          if [ "$HF_TOKEN" != "$HF_TOKEN_RAW" ]; then
            echo "::warning::HF_TOKEN had surrounding whitespace; trimmed before use."
            echo "::warning::Update the secret to remove leading/trailing spaces or newlines."
          fi

          # Export the cleaned values for the next step
          {
            echo "HF_TOKEN=$HF_TOKEN"
            echo "HF_USERNAME=$HF_USERNAME"
          } >> "$GITHUB_ENV"

      - id: bootstrap
        name: Bootstrap HF (dataset + space + secrets + upload)
        env:
          # HF_TOKEN and HF_USERNAME come from $GITHUB_ENV via the previous
          # validation step (already trimmed of whitespace). Don't override
          # them here with the raw secrets.
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME || 'swarmclaw' }}
          HF_DATASET_NAME: ${{ vars.HF_DATASET_NAME || 'swarmclaw-state' }}
          SPACE_HARDWARE: ${{ vars.SPACE_HARDWARE || 'cpu-basic' }}
          SPACE_PRIVATE: ${{ vars.SPACE_PRIVATE || 'false' }}
          DATASET_PRIVATE: ${{ vars.DATASET_PRIVATE || 'true' }}
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          CREDENTIAL_SECRET: ${{ secrets.CREDENTIAL_SECRET }}
          SYNC_INTERVAL_SECONDS: ${{ vars.SYNC_INTERVAL_SECONDS || '300' }}
          SPACE_DIR: deploy/hf-space
        run: python deploy/scripts/bootstrap_hf.py

  cloudflare-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: hf-space
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check Cloudflare credentials
        id: check
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Cloudflare credentials not set; skipping Worker deploy."
            echo "Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo secrets to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: "20"

      - name: Install Worker deps
        if: steps.check.outputs.skip == 'false'
        working-directory: deploy/cloudflare-worker
        run: npm install --no-audit --no-fund

      - name: Render wrangler.toml from template
        if: steps.check.outputs.skip == 'false'
        working-directory: deploy/cloudflare-worker
        env:
          WORKER_NAME: ${{ vars.WORKER_NAME || 'swarmclaw-wake' }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: ${{ vars.HF_SPACE_NAME || 'swarmclaw' }}
          REQUIRE_KEY: ${{ vars.WORKER_REQUIRE_KEY || 'false' }}
        run: |
          set -e
          # Substitute env vars into the template and write wrangler.toml
          envsubst < wrangler.template.toml > wrangler.toml
          echo "--- wrangler.toml ---"
          cat wrangler.toml

      - name: Push Worker secrets
        if: steps.check.outputs.skip == 'false'
        working-directory: deploy/cloudflare-worker
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
        run: |
          set -e
          # wrangler secret bulk takes a JSON file with {key: value} pairs and
          # upserts them all in one call.
          python - <<'PY' > secrets.json
          import json, os
          payload = {"HF_TOKEN": os.environ["HF_TOKEN"]}
          if os.environ.get("ACCESS_KEY"):
              payload["ACCESS_KEY"] = os.environ["ACCESS_KEY"]
          print(json.dumps(payload))
          PY
          npx --yes wrangler@3 secret bulk secrets.json
          rm -f secrets.json

      - name: Deploy Worker
        id: deploy
        if: steps.check.outputs.skip == 'false'
        working-directory: deploy/cloudflare-worker
        run: |
          set -e
          npx --yes wrangler@3 deploy 2>&1 | tee deploy.log
          # Extract the deployed URL (best-effort; format varies by wrangler version)
          WORKER_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.[a-zA-Z0-9-]+\.workers\.dev' deploy.log | tail -n 1 || true)
          echo "worker_url=${WORKER_URL}" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: steps.check.outputs.skip == 'false'
        env:
          SPACE_URL: ${{ needs.hf-space.outputs.space_url }}
          SPACE_DIRECT_URL: ${{ needs.hf-space.outputs.space_direct_url }}
          DATASET_URL: ${{ needs.hf-space.outputs.dataset_url }}
          WORKER_URL: ${{ steps.deploy.outputs.worker_url }}
        run: |
          {
            echo "## Cloudflare Worker"
            echo ""
            echo "- Worker URL: ${WORKER_URL:-'(see deploy log above)'}"
            echo "- Proxies to: ${SPACE_DIRECT_URL}"
            echo "- Wakes Space when sleeping via HF API"
          } >> "$GITHUB_STEP_SUMMARY"
